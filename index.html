<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KarmicCompass</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400&family=DM+Mono:wght@300&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#08080F;color:#FAF7F2;font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:10;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 4vw;height:58px;
}
.logo{font-family:'Cormorant Garamond',serif;font-size:1.2rem;text-decoration:none;color:#FAF7F2;letter-spacing:.02em}
.logo span{color:#C9824A}
.nav-r{display:flex;align-items:center;gap:2rem}
.nav-links{display:flex;gap:1.8rem;list-style:none}
.nav-links a{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;color:rgba(250,247,242,.35);text-decoration:none;transition:color .2s}
.nav-links a:hover{color:rgba(250,247,242,.8)}
.nav-btn{
  font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;
  color:#C9824A;border:1px solid rgba(201,130,74,.4);background:transparent;
  padding:8px 18px;border-radius:2px;cursor:pointer;text-decoration:none;
  transition:background .2s,color .2s;
}
.nav-btn:hover{background:#C9824A;color:#fff}

/* STAGE */
.stage{
  width:100vw;height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  gap:0;
}

/* ambient glow */
.glow{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:60vmin;height:60vmin;border-radius:50%;
  background:radial-gradient(circle,rgba(201,130,74,.13) 0%,transparent 65%);
  animation:breathe 6s ease-in-out infinite;
  pointer-events:none;
}
@keyframes breathe{0%,100%{opacity:.7;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.18)}}

/* MANDALA */
.mandala{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:min(80vmin,520px);height:min(80vmin,520px);
  pointer-events:none;
}
.mandala svg{width:100%;height:100%}
.r1{animation:cw 120s linear infinite;transform-origin:250px 250px}
.r2{animation:ccw 70s linear infinite;transform-origin:250px 250px}
.r3{animation:cw 35s linear infinite;transform-origin:250px 250px}
@keyframes cw{to{transform:rotate(360deg)}}
@keyframes ccw{to{transform:rotate(-360deg)}}

/* CONTENT — layered over mandala */
.content{
  position:relative;z-index:2;
  display:flex;flex-direction:column;align-items:center;
  text-align:center;
  gap:0;
}

.eyebrow{
  font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.28em;text-transform:uppercase;
  color:#C9824A;margin-bottom:1.6rem;
  opacity:0;animation:up .8s .2s forwards;
}

.title{
  font-family:'Cormorant Garamond',serif;font-weight:300;
  font-size:clamp(4.5rem,12vmin,9.5rem);line-height:.88;letter-spacing:-.01em;
  opacity:0;animation:up .9s .35s forwards;
}
.title .t1{display:block;color:#FAF7F2}
.title .t2{display:block;color:#C9824A;animation:cop 5s ease-in-out infinite}
@keyframes cop{0%,100%{color:#C9824A}50%{color:#E8A97A}}

/* karma ring — sits between title and tagline */
.ring-wrap{
  margin:2.2rem 0 1.8rem;
  position:relative;
  opacity:0;animation:fadein .9s .6s forwards;
}
.ring-wrap svg{width:min(22vmin,110px);height:min(22vmin,110px)}
.ring-num{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:'Cormorant Garamond',serif;font-size:clamp(1.2rem,4vmin,2rem);font-weight:300;
  color:#FAF7F2;line-height:1;
}
.ring-lbl{
  position:absolute;bottom:-1.4rem;left:50%;transform:translateX(-50%);
  font-family:'DM Mono',monospace;font-size:.52rem;letter-spacing:.18em;text-transform:uppercase;
  color:rgba(250,247,242,.28);white-space:nowrap;
}
.garc{transition:stroke-dashoffset 2.4s cubic-bezier(.22,1,.36,1)}

.tagline{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:clamp(1rem,2.5vmin,1.35rem);color:rgba(250,247,242,.45);
  line-height:1.55;margin-top:1.4rem;
  opacity:0;animation:up .9s .75s forwards;
}
.tagline em{color:rgba(232,169,122,.7);font-style:normal}

.actions{
  display:flex;gap:.8rem;align-items:center;margin-top:2.2rem;
  opacity:0;animation:up .8s .95s forwards;
}
.btn-a{
  background:#C9824A;color:#fff;
  font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;
  padding:13px 30px;border:none;border-radius:2px;cursor:pointer;text-decoration:none;
  transition:background .2s,transform .2s cubic-bezier(.34,1.56,.64,1);
}
.btn-a:hover{background:#E8A97A;transform:scale(1.05)}
.btn-b{
  font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;
  color:rgba(250,247,242,.3);text-decoration:none;
  transition:color .2s;cursor:pointer;background:none;border:none;padding:0;
}
.btn-b:hover{color:rgba(250,247,242,.7)}

.footnote{
  font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.12em;text-transform:uppercase;
  color:rgba(250,247,242,.18);margin-top:1rem;
  opacity:0;animation:fadein .8s 1.2s forwards;
}

/* VIRTUE DOTS — compass points around mandala */
.vdots{position:absolute;top:50%;left:50%;width:0;height:0;pointer-events:none;z-index:3}
.vd{
  position:absolute;
  font-family:'DM Mono',monospace;font-size:.52rem;letter-spacing:.12em;text-transform:uppercase;
  color:rgba(201,130,74,.35);white-space:nowrap;
  transform:translate(-50%,-50%);
  opacity:0;animation:fadein .6s forwards;
}

/* TICKER */
.ticker{
  position:fixed;bottom:0;left:0;right:0;
  height:36px;display:flex;align-items:center;overflow:hidden;
  border-top:1px solid rgba(250,247,242,.05);
  background:rgba(8,8,15,.7);backdrop-filter:blur(12px);
}
.tick-inner{display:flex;gap:0;width:max-content;animation:tick 30s linear infinite}
.tick-inner span{
  font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;
  color:rgba(201,130,74,.25);padding:0 2rem;
}
@keyframes tick{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* ANIMATIONS */
@keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
@keyframes fadein{from{opacity:0}to{opacity:1}}

/* PARTICLES */
canvas{position:fixed;inset:0;pointer-events:none;z-index:0}
</style>
</head>
<body>

<canvas id="cv"></canvas>

<nav>
  <a class="logo" href="#">Karmic<span>Compass</span></a>
  <div class="nav-r">
    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">Journal</a></li>
      <li><a href="#">Mentor</a></li>
      <li><a href="#">Align</a></li>
      <li><a href="#">Stars</a></li>
      <li><a href="#">Realm</a></li>
    </ul>
    <a class="nav-btn" href="#">Begin Free</a>
  </div>
</nav>

<div class="stage">
  <div class="glow"></div>

  <!-- Mandala behind everything -->
  <div class="mandala">
    <svg viewBox="0 0 500 500" fill="none">
      <g class="r1">
        <circle cx="250" cy="250" r="244" stroke="rgba(201,130,74,.14)" stroke-width=".6"/>
        <circle cx="250" cy="250" r="224" stroke="rgba(201,130,74,.07)" stroke-width=".4"/>
        <line x1="250" y1="6" x2="250" y2="494" stroke="rgba(201,130,74,.09)" stroke-width=".4"/>
        <line x1="6" y1="250" x2="494" y2="250" stroke="rgba(201,130,74,.09)" stroke-width=".4"/>
        <line x1="78" y1="78" x2="422" y2="422" stroke="rgba(201,130,74,.07)" stroke-width=".4"/>
        <line x1="422" y1="78" x2="78" y2="422" stroke="rgba(201,130,74,.07)" stroke-width=".4"/>
        <polygon points="250,8 312,196 496,196 350,314 406,498 250,382 94,498 150,314 4,196 188,196" stroke="rgba(201,130,74,.16)" stroke-width=".5" fill="none"/>
      </g>
      <g class="r2">
        <circle cx="250" cy="250" r="174" stroke="rgba(201,130,74,.2)" stroke-width=".8"/>
        <circle cx="250" cy="250" r="154" stroke="rgba(201,130,74,.09)" stroke-width=".4"/>
        <line x1="250" y1="76" x2="250" y2="424" stroke="rgba(201,130,74,.12)" stroke-width=".4"/>
        <line x1="76" y1="250" x2="424" y2="250" stroke="rgba(201,130,74,.12)" stroke-width=".4"/>
        <line x1="127" y1="127" x2="373" y2="373" stroke="rgba(201,130,74,.09)" stroke-width=".3"/>
        <line x1="373" y1="127" x2="127" y2="373" stroke="rgba(201,130,74,.09)" stroke-width=".3"/>
        <polygon points="250,82 280,162 368,168 304,226 326,314 250,268 174,314 196,226 132,168 220,162" stroke="rgba(201,130,74,.26)" stroke-width=".6" fill="none"/>
      </g>
      <g class="r3">
        <circle cx="250" cy="250" r="108" stroke="rgba(201,130,74,.3)" stroke-width=".9"/>
        <circle cx="250" cy="250" r="85"  stroke="rgba(201,130,74,.16)" stroke-width=".6"/>
        <circle cx="250" cy="250" r="62"  stroke="rgba(201,130,74,.12)" stroke-width=".5"/>
        <circle cx="250" cy="250" r="40"  stroke="rgba(201,130,74,.22)" stroke-width=".7"/>
        <line x1="142" y1="250" x2="358" y2="250" stroke="rgba(201,130,74,.16)" stroke-width=".4"/>
        <line x1="250" y1="142" x2="250" y2="358" stroke="rgba(201,130,74,.16)" stroke-width=".4"/>
        <line x1="174" y1="174" x2="326" y2="326" stroke="rgba(201,130,74,.1)" stroke-width=".3"/>
        <line x1="326" y1="174" x2="174" y2="326" stroke="rgba(201,130,74,.1)" stroke-width=".3"/>
      </g>
      <circle cx="250" cy="250" r="5" fill="rgba(201,130,74,.75)"/>
      <circle cx="250" cy="250" r="2.5" fill="rgba(250,247,242,.6)"/>
    </svg>
  </div>

  <!-- Floating virtue compass labels -->
  <div class="vdots" id="vdots"></div>

  <!-- Centered text content -->
  <div class="content">
    <p class="eyebrow">From Chaos to Clarity</p>
    <h1 class="title">
      <span class="t1">Karmic</span>
      <span class="t2">Compass</span>
    </h1>

    <div class="ring-wrap">
      <svg viewBox="0 0 120 120">
        <circle cx="60" cy="60" r="52" stroke="rgba(250,247,242,.06)" stroke-width="6" fill="none"/>
        <circle cx="60" cy="60" r="52"
          class="garc" id="garc"
          stroke="url(#cg)" stroke-width="6" fill="none"
          stroke-dasharray="327" stroke-dashoffset="327"
          stroke-linecap="round" transform="rotate(-90 60 60)"/>
        <defs>
          <linearGradient id="cg" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#C9824A"/>
            <stop offset="100%" stop-color="#E8A97A"/>
          </linearGradient>
        </defs>
      </svg>
      <div class="ring-num" id="rnum">0</div>
      <div class="ring-lbl">Karma Score</div>
    </div>

    <p class="tagline">
      Your actions create your <em>Destiny</em>.<br>
      Your duty defines your <em>Character</em>.
    </p>

    <div class="actions">
      <a href="#" class="btn-a">Begin Free — 11 Days</a>
      <button class="btn-b">Meet Arya &rarr;</button>
    </div>

    <p class="footnote">No credit card &nbsp;·&nbsp; iOS &amp; Android &nbsp;·&nbsp; $11 / month after trial</p>
  </div>
</div>

<!-- Bottom ticker -->
<div class="ticker">
  <div class="tick-inner" id="ticker"></div>
</div>

<script>
/* PARTICLES */
(function(){
  const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
  let W,H,P=[];
  const resize=()=>{
    W=cv.width=innerWidth;H=cv.height=innerHeight;
    P=Array.from({length:70},()=>({
      x:Math.random()*W,y:Math.random()*H,
      r:Math.random()*.9+.2,
      vx:(Math.random()-.5)*.12,vy:(Math.random()-.5)*.12,
      a:Math.random()*.5+.08,ph:Math.random()*6.28
    }));
  };
  const draw=()=>{
    ctx.clearRect(0,0,W,H);
    const t=Date.now()/1000;
    P.forEach(p=>{
      p.x=(p.x+p.vx+W)%W;p.y=(p.y+p.vy+H)%H;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,6.28);
      ctx.fillStyle=`rgba(201,130,74,${p.a*(.5+.5*Math.sin(t+p.ph))})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  };
  window.addEventListener('resize',resize);resize();draw();
})();

/* TICKER */
(function(){
  const v=['Satya · Truth','·','Dharma · Duty','·','Karma · Action','·','Ahimsa · Compassion','·','Shanti · Peace','·','Seva · Service','·','Viveka · Wisdom','·','Tapas · Discipline','·'];
  const t=document.getElementById('ticker');
  [...v,...v,...v].forEach(x=>{const s=document.createElement('span');s.textContent=x;t.appendChild(s)});
})();

/* VIRTUE DOTS around mandala */
(function(){
  const virtues=[
    {label:'Journal',  angle:-60},
    {label:'Mentor',   angle:-20},
    {label:'Align',    angle:20},
    {label:'Stars',    angle:60},
    {label:'Realm',    angle:130},
    {label:'Home',     angle:-130},
  ];
  const wrap=document.getElementById('vdots');
  const r=Math.min(window.innerWidth,window.innerHeight)*.31;
  virtues.forEach(({label,angle},i)=>{
    const rad=angle*(Math.PI/180);
    const x=Math.cos(rad)*r, y=Math.sin(rad)*r;
    const el=document.createElement('div');
    el.className='vd';
    el.textContent=label;
    el.style.cssText=`left:${x}px;top:${y}px;animation-delay:${.8+i*.15}s`;
    wrap.appendChild(el);
  });
})();

/* KARMA GAUGE */
(function(){
  const arc=document.getElementById('garc'),num=document.getElementById('rnum');
  const total=327,target=total*.78;
  let s=null;
  const run=ts=>{
    if(!s)s=ts;
    const p=Math.min((ts-s)/2200,1),e=1-Math.pow(1-p,4);
    arc.style.strokeDashoffset=total-(target*e);
    num.textContent=Math.round(78*e);
    if(p<1)requestAnimationFrame(run);else num.textContent=78;
  };
  setTimeout(()=>requestAnimationFrame(run),700);
})();

/* MAGNETIC CTA */
document.querySelectorAll('.btn-a,.nav-btn').forEach(b=>{
  b.addEventListener('mousemove',e=>{
    const r=b.getBoundingClientRect();
    b.style.transform=`translate(${(e.clientX-r.left-r.width/2)*.14}px,${(e.clientY-r.top-r.height/2)*.14}px)`;
  });
  b.addEventListener('mouseleave',()=>b.style.transform='');
});
</script>
</body>
</html>
